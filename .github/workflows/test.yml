name: Test

on:
  workflow_dispatch:
  pull_request:
    branches: main
  push:
    branches: main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - macos-latest
          # - windows-11-arm
    runs-on: ${{ matrix.os }}

    steps:
    - name: ⤵️ Checkout Source
      uses: actions/checkout@v6

    - uses: actions/cache@v5
      id: cache
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props', 'global.json') }}

    - name: 🛠️ Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
        dotnet-version: |
          8.0.x
          9.0.x

    # cspell:ignore devel
    - name: 🛠️ Install mono (🐧)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y mono-devel

    - name: 🛠️ Install mono (🍎)
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install mono

    - name: 🛠️ Restore dependencies
      run: dotnet restore

    - name: 🔨 Build
      run: dotnet build

    - name: 🧪 Test
      run: dotnet test --no-progress --disable-logo --no-build

    - name: 🔨 Build AOT tests
      run: dotnet build "tests/Bshox.Tests" -t:PublishAll --no-dependencies -p:PublishDir="${{ github.workspace }}/temp/Bshox.Tests" -p:DebugSymbols=false

    - name: 🧪 Test AOT
      run: dotnet test --no-progress --disable-logo --root-directory "${{ github.workspace }}/temp/Bshox.Tests" --test-modules "${{ runner.os == 'Windows' && '*\Bshox.Tests.exe' || '*/Bshox.Tests' }}"
