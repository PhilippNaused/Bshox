
name: 'Submit SBOM'
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:
  submit-sbom:
    runs-on: ubuntu-latest
    steps:
    - name: ⤵️ Checkout Source
      uses: actions/checkout@v6

    - name: 🕒 Cache NuGet Packages
      uses: actions/cache@v5
      id: cache
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props', 'global.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget

    - name: 🛠️ Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: 🛠️ Restore
      run: dotnet restore

    - name: 📦 Pack
      run: dotnet pack --configuration Release src/Packages.slnf --output publish --no-restore

    - name: 🛠️ Restore Tool
      run: dotnet tool restore

    - name: 🛠️ Generate SBOM
      run: dotnet sbom-tool generate -b publish -bc . -pn Bshox -pv 0.0.0 -ps 'Philipp Naused' -D true

    - name: Upload SBOM
      uses: advanced-security/spdx-dependency-submission-action@v0.2.0
      with:
        filePath: publish/_manifest/spdx_2.2/
